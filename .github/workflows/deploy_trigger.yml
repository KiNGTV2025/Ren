# .github/workflows/trigger_render.yml

name: Trigger Render Deploy (Turkish Time & Date)

on:
  schedule:
    - cron: '0 */8 * * *'  # Her 8 saatte bir
  workflow_dispatch:        # Manuel tetikleme

permissions:
  contents: write  # Yazma izni

jobs:
  update_readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Overwrite README.md with Turkish date & time (Europe/Istanbul)
        run: |
          export LC_TIME=tr_TR.UTF-8
          export TZ=Europe/Istanbul
          echo "README son olarak $(date '+%d %B %Y %H:%M') tarihinde güncellendi." > README.md

      - name: Commit and Push Changes
        run: |
          git add README.md
          git diff --quiet --cached || git commit -m "Otomatik README güncellemesi ile deploy tetiklendi"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
