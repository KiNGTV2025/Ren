# .github/workflows/trigger_render.yml

name: Trigger Render Deploy (Turkish Time & Log Output)

on:
  schedule:
    - cron: '0 */8 * * *'  # Her 8 saatte bir
  workflow_dispatch:        # Manuel tetikleme

permissions:
  contents: write

jobs:
  update_readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Install Turkish locale
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen tr_TR.UTF-8
          sudo update-locale LC_ALL=tr_TR.UTF-8 LANG=tr_TR.UTF-8
          export LANG=tr_TR.UTF-8
          export LC_ALL=tr_TR.UTF-8
          export TZ=Europe/Istanbul

          # Tarihi oluştur ve hem log'a yaz hem README.md dosyasına
          DATE_TR=$(LC_TIME=tr_TR.UTF-8 TZ=Europe/Istanbul date '+%d %B %Y %H:%M')
          echo "✅ Güncelleme zamanı (Türkiye saati): $DATE_TR"
          echo "README son olarak $DATE_TR tarihinde güncellendi." > README.md

      - name: Commit and Push Changes
        run: |
          git add README.md
          git diff --quiet --cached || git commit -m "Otomatik README güncellemesi ile deploy tetiklendi"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
